<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Battle Cell Evolution - Fixed</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; font-family: monospace; }
    </style>
</head>
<body>
    <div id="loading">LOADING SYSTEM...</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // เริ่มต้นเกมหลังจากแน่ใจว่าโหลดครบแล้ว
        window.onload = function() {
            document.getElementById('loading').style.display = 'none';
            console.log("System Ready. Starting game loop...");
            gameLoop();
        };

        function gameLoop() {
            // ล้างหน้าจอ
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, W, H);

            // วาดตัวอย่าง (เพื่อให้แน่ใจว่าแสดงผล)
            ctx.fillStyle = '#00ff66';
            ctx.font = '20px monospace';
            ctx.fillText('SYSTEM OPERATIONAL', W/2 - 100, H/2);
            ctx.fillText('CLICK TO START', W/2 - 70, H/2 + 30);

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
