<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY ARCADE HUB</title>
    <style>
        body { margin: 0; background: #0a0a1a; color: white; font-family: 'Courier New', monospace; }
        .hub { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { background: #161c33; border: 2px solid #1e294b; border-radius: 15px; padding: 20px; cursor: pointer; transition: 0.3s; text-align: center; }
        .card:hover { transform: translateY(-10px); border-color: #00ffcc; }
        #game-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; }
        .back-btn { position: absolute; top: 10px; left: 10px; z-index: 101; cursor: pointer; background: #333; padding: 10px; border-radius: 5px; }
        canvas { display: block; margin: auto; }
    </style>
</head>
<body>

<div class="hub" id="hub">
    <h1>GALAXY ARCADE HUB</h1>
    <div class="grid">
        <div class="card" onclick="alert('เกม Battle Cell กำลังเตรียมอัปเดตระบบ')"><h2>🧬 BATTLE CELL</h2><p>เกมมิวแตนท์เซลล์อวกาศ</p></div>
        <div class="card" onclick="launchGame('dino')"><h2>🦖 DINO MATCH</h2><p>จับคู่ไพ่ไดโนเสาร์ 8-bit</p></div>
        <div class="card" onclick="launchGame('mole')"><h2>🔨 MOLE HUNTER</h2><p>ตีตุ่นในอวกาศ</p></div>
    </div>
</div>

<div id="game-container">
    <div class="back-btn" onclick="exitGame()">⬅️ กลับหน้าหลัก</div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let currentGame = '';

    function launchGame(type) {
        document.getElementById('hub').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        currentGame = type;
        initGame();
    }

    function exitGame() {
        document.getElementById('hub').style.display = 'flex';
        document.getElementById('game-container').style.display = 'none';
        currentGame = '';
    }

    function initGame() {
        canvas.width = 600;
        canvas.height = 400;
        if(currentGame === 'dino') initDino();
        if(currentGame === 'mole') initMole();
    }

    // --- เกมจับคู่ไพ่ไดโนเสาร์ (Dino Memory Match) ---
    function initDino() {
        const icons = ['🦖', '🦕', '🥚', '🌋', '🌴', '🦴'];
        let deck = [...icons, ...icons].sort(() => Math.random() - 0.5);
        let flipped = [];
        let matched = [];

        function draw() {
            ctx.clearRect(0, 0, 600, 400);
            deck.forEach((icon, i) => {
                let x = (i % 4) * 120 + 80;
                let y = Math.floor(i / 4) * 100 + 50;
                ctx.fillStyle = matched.includes(i) || flipped.includes(i) ? '#161c33' : '#333';
                ctx.fillRect(x, y, 100, 80);
                if(matched.includes(i) || flipped.includes(i)) {
                    ctx.font = '40px Arial';
                    ctx.fillText(icon, x + 30, y + 55);
                }
            });
        }
        
        canvas.onclick = (e) => {
            let rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;
            let idx = Math.floor((x - 80) / 120) + Math.floor((y - 50) / 100) * 4;
            if(idx >= 0 && idx < 12 && !flipped.includes(idx) && !matched.includes(idx)) {
                flipped.push(idx);
                if(flipped.length === 2) {
                    if(deck[flipped[0]] === deck[flipped[1]]) matched.push(...flipped);
                    setTimeout(() => { flipped = []; draw(); }, 500);
                }
                draw();
            }
        };
        draw();
    }

    // --- เกมตีตุ่น (Mole Hunter) ---
    function initMole() {
        let score = 0;
        let molePos = 0;
        
        setInterval(() => {
            molePos = Math.floor(Math.random() * 9);
            draw();
        }, 800);

        function draw() {
            ctx.clearRect(0, 0, 600, 400);
            ctx.fillStyle = 'white';
            ctx.fillText('คะแนน: ' + score, 20, 30);
            for(let i=0; i<9; i++) {
                let x = (i % 3) * 150 + 100;
                let y = Math.floor(i / 3) * 100 + 80;
                ctx.fillStyle = '#444';
                ctx.beginPath(); ctx.arc(x+50, y+40, 30, 0, Math.PI*2); ctx.fill();
                if(i === molePos) {
                    ctx.fillStyle = 'brown';
                    ctx.fillText('🐹', x+35, y+50);
                }
            }
        }

        canvas.onclick = (e) => {
            let rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;
            let idx = Math.floor((x - 100) / 150) + Math.floor((y - 80) / 100) * 3;
            if(idx === molePos) { score++; molePos = -1; draw(); }
        };
        draw();
    }
</script>
</body>
</html>
