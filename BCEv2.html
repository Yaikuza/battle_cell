<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vampire Survivors Lite - Space Cell Evolution</title>
<!-- 🛰️ โหลดไลบรารีระบบคลาวด์ Supabase JS Client v2 อย่างเป็นทางการ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* 🎨 ดีไซน์สไตล์อวกาศลึกลับตามต้นฉบับดั้งเดิม ปรับเป็น Full Screen */
* {
user-select: none;
-webkit-tap-highlight-color: transparent;
box-sizing: border-box;
}

body, html {
margin: 0;
padding: 0;
width: 100%;
height: 100%;
background: linear-gradient(135deg, #0a0f1e, #0a0a1a);
font-family: 'Courier New', monospace;
overflow: hidden;
display: flex;
justify-content: center;
align-items: center;
}

.game-container {
position: relative;
width: 100vw;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
background: #11141f;
}

canvas {
display: block;
background: #0d101a;
}

/* 🕹️ หน้าจอเลือกโหมดการควบคุมแบบแบ่งซ้าย-ขวาขนาดใหญ่สะใจ */
#start-screen {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(10, 15, 30, 0.95);
display: flex;
flex-direction: column;
z-index: 20;
}

#start-screen .title-area {
text-align: center;
padding: 40px 20px;
background: linear-gradient(to bottom, rgba(27,34,52,0.8), transparent);
}

#start-screen h1 {
color: #fff;
font-size: 32px;
margin: 0 0 10px 0;
text-shadow: 0 0 15px rgba(0,255,204,0.4);
letter-spacing: 2px;
}

#start-screen p {
color: #888;
font-size: 14px;
margin: 0;
}

.mode-selection-wrapper {
display: flex;
flex: 1;
width: 100%;
height: 100%;
}

/* แบ่งครึ่งหน้าจอ ซ้าย-ขวา */
.mode-split-btn {
flex: 1;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
background: transparent;
border: none;
color: white;
font-family: 'Courier New', monospace;
cursor: pointer;
transition: all 0.3s ease;
padding: 40px;
position: relative;
border-top: 1px solid rgba(255,255,255,0.05);
}

.mode-split-btn:first-child {
border-right: 1px solid rgba(255,255,255,0.1);
}

.mode-split-btn:hover {
background: rgba(27, 34, 52, 0.4);
}

.mode-split-btn:hover .icon {
transform: scale(1.15);
text-shadow: 0 0 20px #00ffcc;
}

.mode-split-btn:hover .btn-title {
color: #00ffcc;
}

.mode-split-btn .icon {
font-size: 64px;
margin-bottom: 20px;
transition: transform 0.3s ease;
}

.mode-split-btn .btn-title {
font-size: 22px;
font-weight: bold;
margin-bottom: 10px;
letter-spacing: 1px;
color: #fff;
}

.mode-split-btn .btn-desc {
font-size: 13px;
color: #6b7280;
text-align: center;
max-width: 280px;
line-height: 1.4;
}

/* 🧬 หน้าต่างเลือกการ์ดวิวัฒนาการตอนเลเวลอัป */
#evolution-overlay {
display: none;
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(10, 15, 30, 0.9);
justify-content: center;
align-items: center;
flex-direction: column;
z-index: 10;
}

#evolution-overlay h2 {
color: #fff;
margin-bottom: 25px;
text-shadow: 0 0 10px #00ffcc;
font-size: 26px;
text-align: center;
padding: 0 20px;
}

.card-container {
display: flex;
gap: 20px;
justify-content: center;
align-items: center;
width: 90%;
max-width: 800px;
flex-wrap: wrap; /* รองรับจอแนวตั้งหรือจอมือถือไม่ให้หลุดวงโคจร */
}

.evo-card {
background: #161a26;
border: 2px solid #2d3748;
border-radius: 16px;
padding: 20px;
width: 220px;
text-align: center;
color: white;
cursor: pointer;
transition: all 0.2s ease;
font-family: 'Courier New', monospace;
box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

.evo-card:hover {
transform: translateY(-8px);
border-color: #00ffcc;
background: #1f2536;
box-shadow: 0 0 15px rgba(0,255,204,0.3);
}

.evo-card h3 {
margin: 0 0 10px 0;
color: #00ffcc;
font-size: 16px;
}

.evo-card p {
font-size: 13px;
color: #a0aec0;
margin: 0;
line-height: 1.4;
}

/* 🧬 หน้าจอเซฟคะแนนและแสดงตารางจัดอันดับช่วงจบเกม (Leaderboard) */
#score-save-overlay {
display: none;
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(10, 15, 30, 0.95);
justify-content: center;
align-items: center;
flex-direction: column;
z-index: 30;
color: #fff;
overflow-y: auto;
padding: 20px;
}

#score-save-overlay h2 {
color: #ff3333;
font-size: 32px;
margin-bottom: 5px;
text-shadow: 0 0 15px rgba(255,51,51,0.4);
text-align: center;
}

.score-display-box {
background: #161a26;
border: 1px solid #2d3748;
border-radius: 16px;
padding: 20px;
width: 100%;
max-width: 420px;
text-align: center;
margin-bottom: 20px;
}

.score-display-box .big-score {
font-size: 42px;
font-weight: bold;
color: #00ffcc;
margin: 10px 0;
text-shadow: 0 0 15px rgba(0,255,204,0.3);
}

.input-name-field {
background: #0d101a;
border: 2px solid #2d3748;
border-radius: 8px;
color: #fff;
font-family: 'Courier New', monospace;
font-size: 16px;
padding: 10px;
width: 100%;
text-align: center;
margin-top: 10px;
outline: none;
text-transform: uppercase;
}

.input-name-field:focus {
border-color: #00ffcc;
box-shadow: 0 0 10px rgba(0,255,204,0.2);
}

.save-score-btn {
background: linear-gradient(135deg, #00ffcc, #0099ff);
border: none;
border-radius: 8px;
color: #000;
font-family: 'Courier New', monospace;
font-size: 15px;
font-weight: bold;
padding: 12px 24px;
cursor: pointer;
margin-top: 15px;
transition: all 0.2s ease;
width: 100%;
}

.save-score-btn:hover {
transform: scale(1.02);
box-shadow: 0 0 15px rgba(0,255,204,0.4);
}

/* ตารางจัดอันดับความสูง */
.leaderboard-container {
width: 100%;
max-width: 500px;
background: rgba(22, 26, 38, 0.8);
border: 1px solid #2d3748;
border-radius: 16px;
padding: 20px;
box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.leaderboard-title {
color: #00ffcc;
font-size: 18px;
font-weight: bold;
text-align: center;
margin-bottom: 15px;
letter-spacing: 2px;
text-shadow: 0 0 10px rgba(0,255,204,0.3);
}

.leaderboard-table {
width: 100%;
border-collapse: collapse;
color: #fff;
font-size: 12px;
}

.leaderboard-table th {
border-bottom: 2px solid #2d3748;
padding: 8px;
color: #888;
text-align: left;
}

.leaderboard-table td {
padding: 8px;
border-bottom: 1px dashed rgba(255,255,255,0.05);
}

.rank-highlight {
font-weight: bold;
color: #ff9900;
}
</style>
</head>
<body>

<div class="game-container">
    <!-- หน้าเลือกโหมดควบคุม ซ้าย-ขวา บิ๊กเบิ้ม -->
    <div id="start-screen">
        <div class="title-area">
            <h1>BATTLE CELL EVOLUTION</h1>
            <p>CHOOSE INTERFACE CONTROL MODE TO START SYSTEM</p>
        </div>
        <div class="mode-selection-wrapper">
            <button class="mode-split-btn" onclick="startGame('wasd')">
                <div class="icon">🕹️</div>
                <div class="btn-title">KEYBOARD CONTROLS</div>
                <div class="btn-desc">ใช้ปุ่ม W, A, S, D ในการบังคับทิศทางอย่างแม่นยำ เหมาะสำหรับสายฮาร์ดคอร์</div>
            </button>
            <button class="mode-split-btn" onclick="startGame('mouse')">
                <div class="icon">🖱️</div>
                <div class="btn-title">MOUSE & TOUCH</div>
                <div class="btn-desc">ลากเมาส์ขยับตามมือแบบสมูทลื่นไหล หรือใช้นิ้วลากสไลด์บนหน้าจอโทรศัพท์</div>
            </button>
        </div>
    </div>

    <!-- หน้าต่างสุ่มการ์ดวิวัฒนาการตอนเลเวลอัป -->
    <div id="evolution-overlay">
        <h2>🧬 CHOOSE YOUR EVOLUTION 🧬</h2>
        <div class="card-container" id="card-list"></div>
    </div>

    <!-- 🏆 หน้าต่างเซฟคะแนนสูงสุดตอนตาย พร้อมดึงตารางจัดอันดับย้ายมาขึ้นแสดงที่นี่ -->
    <div id="score-save-overlay">
        <h2>CELL DESTROYED! 💀</h2>
        <div class="score-display-box">
            <div style="font-size: 14px; color: #888;">YOUR FINAL SCORE</div>
            <div class="big-score" id="final-score-val">0000</div>
            <div id="final-stats-desc" style="font-size: 13px; color: #a0aec0; margin-bottom: 10px;">LEVEL: 1 • TIME: 0s</div>
            <input type="text" id="player-name-input" class="input-name-field" maxlength="10" placeholder="ENTER CELL NAME" value="MUTANT">
            <button class="save-score-btn" onclick="submitScore()">SAVE EVOLUTION RECORD</button>
        </div>

        <!-- 🏆 ตารางผู้นำถูดจัดเรียงส่องกระกายล่อเป้าความสนุกหลังตายตรงนี้ -->
        <div class="leaderboard-container">
            <div class="leaderboard-title">🏆 GALAXY LEADERBOARD 🏆</div>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th style="width: 15%">RANK</th>
                        <th style="width: 45%">CELL NAME</th>
                        <th style="width: 15%">LVL</th>
                        <th style="width: 15%">TIME</th>
                        <th style="width: 10%">SCORE</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <!-- โหลดคะแนนสดเข้ามาวางที่นี่ -->
                </tbody>
            </table>
        </div>
    </div>
    
    <canvas id="gameCanvas"></canvas>
</div>

<script>
// 🛰️ การตั้งค่า Supabase บันทึกคะแนนแบบไม่มี Error ซ้ำซ้อนกับ SDK
const SUPABASE_URL = "https://lyxqczagqlvtlxmdzuub.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_TiXb67odxsidAFplFqvpQA_U4y8tDME";
let supabaseClient = null;

// เชื่อมต่อ Client ผ่านตัวแปรที่ไม่ซ้ำ
try {
    if (SUPABASE_URL && SUPABASE_ANON_KEY && typeof window.supabase !== 'undefined') {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
} catch (e) {
    console.log("เชื่อมต่อ Supabase ไม่สำเร็จ ระบบสลับไปใช้ Local Storage");
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W = window.innerWidth;
let H = window.innerHeight;

let gameStarted = false;
let gameOver = false;
let isPaused = false;
let frames = 0;
let realSurvivalTime = 0; // วินาทีจริงที่รอดชีวิต

let controlMode = 'wasd';
let mouseX = W / 2;
let mouseY = H / 2;

// 🪐 ระบบกระดานผู้นำอัพเดตสถิติล่าสุด (จัดเรียงคะแนนแบบ Local Fallback)
let localLeaderboard = [
    { name: "VOID_DRIFTER", level: 12, time: 145, score: 13450 },
    { name: "MUTANT_X", level: 8, time: 92, score: 8920 },
    { name: "VIRUS_SLAYER", level: 5, time: 61, score: 5610 }
];

// โหลดคะแนนจากฐานข้อมูลหรือ LocalStorage
async function loadLeaderboard() {
    if (supabaseClient) {
        try {
            let { data, error } = await supabaseClient
                .from('leaderboard')
                .select('*')
                .order('score', { ascending: false })
                .limit(5);
            
            if (error) throw error;
            if (data && data.length > 0) {
                localLeaderboard = data;
            }
        } catch (e) {
            console.log("โหลดคะแนนล้มเหลว ดึงแคชเดิมในเครื่องแทน:", e.message);
            loadLocalStorageFallback();
        }
    } else {
        loadLocalStorageFallback();
    }
    renderLeaderboard();
}

function loadLocalStorageFallback() {
    try {
        const stored = localStorage.getItem('space_cell_leaderboard');
        if (stored) {
            localLeaderboard = JSON.parse(stored);
        }
    } catch(e) {}
}

function renderLeaderboard() {
    const tbody = document.getElementById('leaderboard-body');
    if (!tbody) return;
    tbody.innerHTML = '';
    
    // จัดเรียงคะแนนลงตารางสีทองสุดหรูหรา
    localLeaderboard.sort((a, b) => b.score - a.score);
    localLeaderboard.forEach((record, index) => {
        const rank = index + 1;
        const row = document.createElement('tr');
        row.innerHTML = `
            <td class="rank-highlight">#${rank}</td>
            <td style="color: #00ffcc; font-weight: bold;">${record.name}</td>
            <td>${record.level}</td>
            <td>${record.time}s</td>
            <td style="color: #ff9900; font-weight: bold;">${record.score}</td>
        `;
        tbody.appendChild(row);
    });
}

// 🪐 ระบบอนุภาคพื้นหลังดวงดาวระยิบระยับ (Starfield)
let stars = [];
function initStars() {
    stars = [];
    let starCount = Math.floor((W * H) / 4000); 
    for (let i = 0; i < starCount; i++) {
        stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            size: Math.random() * 2,
            speed: Math.random() * 0.5 + 0.1,
            brightness: Math.random()
        });
    }
}

function resizeCanvas() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    initStars();
    
    if (player && player.x) {
        player.x = Math.max(player.radius + 10, Math.min(W - player.radius - 10, player.x));
        player.y = Math.max(player.radius + 30, Math.min(H - player.radius - 10, player.y));
    }
}
window.addEventListener('resize', resizeCanvas);

// ระบบคีย์บอร์ด
let keys = { w: false, a: false, s: false, d: false };
window.addEventListener('keydown', e => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; });

function handleMouseMove(e) {
    if (!gameStarted || isPaused || gameOver) return;
    const rect = canvas.getBoundingClientRect();
    let clientX, clientY;
    
    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    
    mouseX = clientX - rect.left;
    mouseY = clientY - rect.top;
}

canvas.addEventListener('mousemove', handleMouseMove);
canvas.addEventListener('touchmove', handleMouseMove, { passive: false });
canvas.addEventListener('touchstart', handleMouseMove);

// ตัวแปรระบบเกม
let player = {};
let evolution = { tail: 0, eye: 0, spike: 0, wings: 0 };

// 🧬 ตัวเลือกวิวัฒนาการอัพเกรด 10 รูปแบบสมบูรณ์
const mutationPool = [
    { id: 'tail', name: 'TAIL MUTANT 🪱', desc: 'เพิ่มความเร็วเดิน +15% และปล่อยเมือกสไลม์ถ่วงเวลาศัตรูบนพื้น', apply: () => evolution.tail++ },
    { id: 'eye', name: 'HYPER EYE 👁️', desc: 'เพิ่มการยิงลูกพลังเวทติดตามศัตรูที่อยู่ใกล้ที่สุดอัตโนมัติ', apply: () => evolution.eye++ },
    { id: 'spike', name: 'SPIKE SHELL 🌵', desc: 'สร้างหนามแหลมคมหมุนรอบตัว ทำดาเมจต่อเนื่องรอบทิศ', apply: () => evolution.spike++ },
    { id: 'wings', name: 'ENERGY WINGS 🪽', desc: 'ติดตั้งปีกพลังงานนิวเคลียส ปล่อยคลื่นช็อกเวฟวงแหวนผลักศัตรูให้กระเด็นออกไป', apply: () => evolution.wings++ },
    { id: 'armor', name: 'NANO SHIELD 🛡️', desc: 'เพิ่มพลังชีวิตสูงสุด (Max HP) +20% พร้อมฟื้นฟูเลือดทันที', apply: () => { player.maxHp = Math.floor(player.maxHp * 1.2); player.hp = player.maxHp; } },
    { id: 'damage', name: 'COSMIC ATK 💥', desc: 'เพิ่มประสิทธิภาพกระสุนเดิมให้ทะลุทะลวงแรงขึ้น +25%', apply: () => player.atkMultiplier = (player.atkMultiplier || 1) + 0.25 },
    { id: 'lifesteal', name: 'VAMPIRIC CELL 🩸', desc: 'มีโอกาส 10% ที่จะดูดเลือดจากการทำลายศัตรูเพื่อฟื้นฟู 1 HP', apply: () => player.lifesteal = (player.lifesteal || 0) + 0.1 },
    { id: 'regen', name: 'REGEN NUCLEUS 🧬', desc: 'วิวัฒนาการแกนกลางฟื้นฟูฟื้น HP 1 หน่วยทุก ๆ 5 วินาที', apply: () => player.regenLevel = (player.regenLevel || 0) + 1 },
    { id: 'magnet', name: 'GRAVITY PULL 🧲', desc: 'เพิ่มขอบเขตการดูดเก็บมณี EXP อวกาศรอบตัวกว้างขึ้นอีก 50%', apply: () => player.magnetMultiplier = (player.magnetMultiplier || 1) + 0.5 },
    { id: 'crit', name: 'CRITICAL OVERDRIVE ⚡', desc: 'กระสุนมีโอกาสคริติคอล 15% ทำความเสียหายแรงขึ้นเป็นสองเท่า', apply: () => player.critChance = (player.critChance || 0) + 0.15 }
];

let enemies = [];
let enemyProjectiles = []; 
let projectiles = [];
let expOrbs = [];
let slimes = [];
let shockwaves = []; 

function startGame(mode) {
    controlMode = mode;
    gameStarted = true;
    document.getElementById('start-screen').style.display = 'none';
    
    if (controlMode === 'mouse') {
        canvas.style.cursor = 'none';
    } else {
        canvas.style.cursor = 'default';
    }
    
    resetGame();
}

function resetGame() {
    gameOver = false;
    isPaused = false;
    frames = 0;
    realSurvivalTime = 0;
    enemies = [];
    projectiles = [];
    enemyProjectiles = [];
    expOrbs = [];
    slimes = [];
    shockwaves = [];
    evolution = { tail: 0, eye: 0, spike: 0, wings: 0 };
    
    player = {
        x: W / 2,
        y: H / 2,
        radius: 16,
        hp: 5,
        maxHp: 5,
        invincibleTime: 0,
        level: 1,
        xp: 0,
        xpNeeded: 10,
        shootCooldown: 0,
        wingsCooldown: 0,
        atkMultiplier: 1.0,
        lifesteal: 0,
        regenLevel: 0,
        magnetMultiplier: 1.0,
        critChance: 0
    };
    
    mouseX = W / 2;
    mouseY = H / 2;
    document.getElementById('evolution-overlay').style.display = 'none';
    document.getElementById('score-save-overlay').style.display = 'none';
}

function updateStars() {
    stars.forEach(star => {
        star.y += star.speed; 
        if (star.y > H) {
            star.y = 0;
            star.x = Math.random() * W;
        }
        star.brightness += (Math.random() * 0.1 - 0.05);
        star.brightness = Math.max(0.2, Math.min(1, star.brightness));
    });
}

function updatePlayerPosition() {
    if (!gameStarted || gameOver || isPaused) return;
    
    let topSafetyBound = 35; 
    let sideSafetyBound = player.radius + 5;

    if (controlMode === 'wasd') {
        let currentSpeed = 3.5 + (evolution.tail * 0.6);
        if (keys.w) player.y -= currentSpeed;
        if (keys.s) player.y += currentSpeed;
        if (keys.a) player.x -= currentSpeed;
        if (keys.d) player.x += currentSpeed;
    } else {
        let currentEasingSpeed = 0.08 + (evolution.tail * 0.02);
        let dx = mouseX - player.x;
        let dy = mouseY - player.y;
        player.x += dx * currentEasingSpeed;
        player.y += dy * currentEasingSpeed;
    }
    
    player.x = Math.max(sideSafetyBound, Math.min(W - sideSafetyBound, player.x));
    player.y = Math.max(topSafetyBound, Math.min(H - player.radius - 10, player.y));
    
    if (player.invincibleTime > 0) player.invincibleTime--;
    
    if (evolution.tail > 0 && frames % 28 === 0) {
        slimes.push({ x: player.x, y: player.y, radius: 10 + (evolution.tail * 2), duration: 180 });
    }

    if (evolution.wings > 0) {
        if (player.wingsCooldown > 0) {
            player.wingsCooldown--;
        } else {
            shockwaves.push({
                x: player.x,
                y: player.y,
                currentRadius: player.radius,
                maxRadius: 60 + (evolution.wings * 20),
                speed: 4,
                damage: (0.5 + (evolution.wings * 0.5)) * player.atkMultiplier,
                pushForce: 8 + (evolution.wings * 2)
            });
            player.wingsCooldown = Math.max(60, 180 - (evolution.wings * 20));
        }
    }

    if (player.regenLevel > 0 && frames % 300 === 0) {
        if (player.hp < player.maxHp) {
            player.hp = Math.min(player.maxHp, player.hp + player.regenLevel);
        }
    }
}

function fireWeapons() {
    if (!gameStarted || gameOver || isPaused) return;
    
    if (player.shootCooldown > 0) {
        player.shootCooldown--;
    } else {
        let baseCount = 4;
        let isCrit = Math.random() < player.critChance;
        let currentAtk = (isCrit ? 2 : 1) * player.atkMultiplier;

        for (let i = 0; i < baseCount; i++) {
            let angle = (i * Math.PI * 2) / baseCount + (frames * 0.015);
            projectiles.push({
                x: player.x, y: player.y,
                vx: Math.cos(angle) * 5.5, vy: Math.sin(angle) * 5.5,
                radius: isCrit ? 6 : 4, 
                damage: currentAtk, 
                color: isCrit ? '#ffff00' : '#00ffcc'
            });
        }
        
        if (evolution.eye > 0 && enemies.length > 0) {
            let closestEnemy = null;
            let minDist = Infinity;
            enemies.forEach(e => {
                let d = Math.hypot(e.x - player.x, e.y - player.y);
                if (d < minDist) { minDist = d; closestEnemy = e; }
            });
            
            if (closestEnemy) {
                let angle = Math.atan2(closestEnemy.y - player.y, closestEnemy.x - player.x);
                for(let i = 0; i < evolution.eye; i++) {
                    let spreadAngle = angle + (i * 0.15) - ((evolution.eye-1) * 0.075);
                    projectiles.push({
                        x: player.x, y: player.y,
                        vx: Math.cos(spreadAngle) * 8, vy: Math.sin(spreadAngle) * 8,
                        radius: isCrit ? 8 : 6, 
                        damage: currentAtk * 2, 
                        color: isCrit ? '#ff5500' : '#ff0066'
                    });
                }
            }
        }
        player.shootCooldown = 38;
    }
}

function updateProjectiles() {
    for (let i = projectiles.length - 1; i >= 0; i--) {
        let p = projectiles[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < -10 || p.x > W + 10 || p.y < -10 || p.y > H + 10) projectiles.splice(i, 1);
    }

    for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
        let ep = enemyProjectiles[i];
        ep.x += ep.vx; ep.y += ep.vy;
        
        let distToPlayer = Math.hypot(player.x - ep.x, player.y - ep.y);
        if (distToPlayer < player.radius + ep.radius) {
            if (player.invincibleTime === 0 && !gameOver && !isPaused) {
                player.hp--;
                player.invincibleTime = 30;
                if (player.hp <= 0) handleGameOver();
            }
            enemyProjectiles.splice(i, 1);
            continue;
        }

        if (ep.x < -10 || ep.x > W + 10 || ep.y < -10 || ep.y > H + 10) {
            enemyProjectiles.splice(i, 1);
        }
    }

    for (let i = slimes.length - 1; i >= 0; i--) {
        slimes[i].duration--;
        if (slimes[i].duration <= 0) slimes.splice(i, 1);
    }

    for (let i = shockwaves.length - 1; i >= 0; i--) {
        let sw = shockwaves[i];
        sw.currentRadius += sw.speed;
        if (sw.currentRadius >= sw.maxRadius) {
            shockwaves.splice(i, 1);
        }
    }
}

function spawnManager() {
    if (!gameStarted || isPaused || gameOver) return;
    let maxEnemies = Math.min(60, Math.floor((W * H) / 11000));
    
    if (frames % 40 === 0 && enemies.length < maxEnemies) {
        let side = Math.floor(Math.random() * 4);
        let x, y;
        if (side === 0) { x = Math.random() * W; y = -30; }
        else if (side === 1) { x = W + 30; y = Math.random() * H; }
        else if (side === 2) { x = Math.random() * W; y = H + 30; }
        else { x = -30; y = Math.random() * H; }
        
        let canSpawnSpitter = frames > 1800;
        let type = 'runner';
        if (canSpawnSpitter && Math.random() < 0.25) {
            type = 'spitter';
        }
        
        if (type === 'spitter') {
            enemies.push({ 
                x: x, y: y, radius: 14, 
                speed: 1.0, hp: 3, type: 'spitter', 
                shootCooldown: Math.floor(Math.random() * 60) + 60,
                color: '#9933ff' 
            });
        } else {
            enemies.push({ 
                x: x, y: y, radius: 11, 
                speed: 1.6, hp: 2, type: 'runner',
                color: '#ff3333' 
            });
        }
    }
}

function updateEnemies() {
    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let dist = Math.hypot(dx, dy);
        
        let isSlowed = false;
        slimes.forEach(s => {
            if (Math.hypot(e.x - s.x, e.y - s.y) < s.radius) isSlowed = true;
        });
        let currentEnemySpeed = isSlowed ? e.speed * 0.35 : e.speed;
        
        if (e.type === 'spitter') {
            if (dist > 220) {
                e.x += (dx / dist) * currentEnemySpeed;
                e.y += (dy / dist) * currentEnemySpeed;
            } else if (dist < 180) {
                e.x -= (dx / dist) * currentEnemySpeed;
                e.y -= (dy / dist) * currentEnemySpeed;
            }
            
            if (dist < 400) {
                if (e.shootCooldown > 0) {
                    e.shootCooldown--;
                } else {
                    let angle = Math.atan2(player.y - e.y, player.x - e.x);
                    enemyProjectiles.push({
                        x: e.x, y: e.y,
                        vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4,
                        radius: 5, color: '#b300b3' 
                    });
                    e.shootCooldown = 120;
                }
            }
        } else {
            if (dist > 0) {
                e.x += (dx / dist) * currentEnemySpeed;
                e.y += (dy / dist) * currentEnemySpeed;
            }
        }
        
        if (dist < player.radius + e.radius && player.invincibleTime === 0 && gameStarted && !gameOver && !isPaused) {
            player.hp--;
            player.invincibleTime = 30;
            if (player.hp <= 0) handleGameOver();
        }
        
        shockwaves.forEach(sw => {
            let distToShock = Math.hypot(e.x - sw.x, e.y - sw.y);
            if (Math.abs(distToShock - sw.currentRadius) < 15) {
                e.hp -= sw.damage / 60; 
                
                let pushX = (e.x - player.x) / distToShock;
                let pushY = (e.y - player.y) / distToShock;
                e.x += pushX * sw.pushForce;
                e.y += pushY * sw.pushForce;
            }
        });
        
        for (let j = projectiles.length - 1; j >= 0; j--) {
            let p = projectiles[j];
            if (Math.hypot(e.x - p.x, e.y - p.y) < e.radius + p.radius) {
                e.hp -= p.damage;
                projectiles.splice(j, 1);
                if (e.hp <= 0) {
                    if (player.lifesteal && Math.random() < player.lifesteal) {
                        player.hp = Math.min(player.maxHp, player.hp + 1);
                    }
                    expOrbs.push({ x: e.x, y: e.y, value: e.type === 'spitter' ? 4 : 2 }); 
                    enemies.splice(i, 1);
                    break;
                }
            }
        }
        
        if (evolution.spike > 0) {
            let spikeRadius = player.radius + 25;
            let spikeAngle = frames * 0.05;
            for (let k = 0; k < evolution.spike; k++) {
                let finalAngleFixed = spikeAngle + (k * (Math.PI * 2 / evolution.spike));
                let sx = player.x + Math.cos(finalAngleFixed) * spikeRadius;
                let sy = player.y + Math.sin(finalAngleFixed) * spikeRadius;
                
                if (Math.hypot(e.x - sx, e.y - sy) < e.radius + 6) {
                    e.hp -= 0.15 * player.atkMultiplier;
                    if (e.hp <= 0) {
                        expOrbs.push({ x: e.x, y: e.y, value: e.type === 'spitter' ? 4 : 2 });
                        enemies.splice(i, 1);
                        break;
                    }
                }
            }
        }
    }
}

function updateExpOrbs() {
    for (let i = expOrbs.length - 1; i >= 0; i--) {
        let o = expOrbs[i];
        let dist = Math.hypot(player.x - o.x, player.y - o.y);
        
        let magnetRange = (65 + (evolution.eye * 20)) * (player.magnetMultiplier || 1);
        if (dist < magnetRange) {
            o.x += (player.x - o.x) * 0.16;
            o.y += (player.y - o.y) * 0.16;
        }
        
        if (dist < player.radius + 6) {
            player.xp += o.value;
            expOrbs.splice(i, 1);
            if (player.xp >= player.xpNeeded) triggerEvolutionMenu();
        }
    }
}

function triggerEvolutionMenu() {
    isPaused = true;
    player.xp -= player.xpNeeded;
    player.level++;
    player.xpNeeded = Math.floor(player.xpNeeded * 1.5);
    
    const overlay = document.getElementById('evolution-overlay');
    const cardList = document.getElementById('card-list');
    cardList.innerHTML = '';
    
    let shuffled = [...mutationPool].sort(() => 0.5 - Math.random()).slice(0, 3);
    shuffled.forEach(mutation => {
        let isGeneralStats = !evolution.hasOwnProperty(mutation.id);
        let currentLvl = isGeneralStats ? "LVL 1" : "LEVEL " + evolution[mutation.id];
        
        let card = document.createElement('div');
        card.className = 'evo-card';
        card.innerHTML = `
            <h3>${mutation.name}</h3>
            <p>${mutation.desc}</p>
            <div style="margin-top:10px; font-size:12px; color:#00ffcc;">${currentLvl}</div>
        `;
        
        card.onclick = () => {
            mutation.apply();
            isPaused = false;
            overlay.style.display = 'none';
            mouseX = player.x;
            mouseY = player.y;
        };
        cardList.appendChild(card);
    });
    overlay.style.display = 'flex';
}

let lastCalculatedScore = 0;
function handleGameOver() {
    gameOver = true;
    
    // คำนวณสถิติส่งขึ้นกระดานคะแนนสีทอง
    lastCalculatedScore = (player.level * 1000) + (Math.floor(realSurvivalTime) * 10);
    
    document.getElementById('final-score-val').innerText = lastCalculatedScore;
    document.getElementById('final-stats-desc').innerText = `LEVEL: ${player.level} • TIME: ${Math.floor(realSurvivalTime)}s`;
    
    loadLeaderboard();
    document.getElementById('score-save-overlay').style.display = 'flex';
}

async function submitScore() {
    let rawName = document.getElementById('player-name-input').value.trim();
    let finalName = rawName !== "" ? rawName.toUpperCase() : "MUTANT";
    
    const newRecord = {
        name: finalName,
        level: player.level,
        time: Math.floor(realSurvivalTime),
        score: lastCalculatedScore
    };

    if (supabaseClient) {
        try {
            const { error } = await supabaseClient
                .from('leaderboard')
                .insert([newRecord]);
            if (error) throw error;
            console.log("บันทึกสถิติลงคลาวด์เรียบร้อยแล้วค๊า!");
        } catch (e) {
            console.log("บันทึกลงคลาวด์ล้มเหลว เซฟออฟไลน์แทน:", e.message);
            saveLocalStorageFallback(newRecord);
        }
    } else {
        saveLocalStorageFallback(newRecord);
    }
    
    await loadLeaderboard();
    document.getElementById('score-save-overlay').style.display = 'none';
    document.getElementById('start-screen').style.display = 'flex';
    gameStarted = false;
}

function saveLocalStorageFallback(newRecord) {
    localLeaderboard.push(newRecord);
    localLeaderboard.sort((a, b) => b.score - a.score);
    localLeaderboard = localLeaderboard.slice(0, 5);
    try {
        localStorage.setItem('space_cell_leaderboard', JSON.stringify(localLeaderboard));
    } catch(e) {}
}

function draw() {
    ctx.fillStyle = '#0d101a';
    ctx.fillRect(0, 0, W, H);
    
    stars.forEach(star => {
        ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
    });
    if (!isPaused && !gameOver && gameStarted) updateStars();
    
    if (!gameStarted) return; 
    
    slimes.forEach(s => {
        ctx.fillStyle = 'rgba(0, 255, 100, 0.1)';
        ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2); ctx.fill();
    });
    
    shockwaves.forEach(sw => {
        ctx.strokeStyle = `rgba(0, 102, 255, ${1 - (sw.currentRadius / sw.maxRadius)})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(sw.x, sw.y, sw.currentRadius, 0, Math.PI * 2);
        ctx.stroke();
    });
    
    expOrbs.forEach(o => {
        ctx.fillStyle = '#00ff66';
        ctx.beginPath(); ctx.arc(o.x, o.y, 4, 0, Math.PI * 2); ctx.fill();
    });
    
    projectiles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
    });

    enemyProjectiles.forEach(ep => {
        ctx.fillStyle = ep.color;
        ctx.beginPath(); ctx.arc(ep.x, ep.y, ep.radius, 0, Math.PI * 2); ctx.fill();
    });
    
    enemies.forEach(e => {
        ctx.fillStyle = e.color;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2); ctx.fill();
        
        if (e.type === 'spitter') {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(e.x, e.y, e.radius + 3, 0, Math.PI * 2); ctx.stroke();
        }
    });
    
    if (evolution.spike > 0) {
        let spikeRadius = player.radius + 25;
        let spikeAngle = frames * 0.05;
        for (let i = 0; i < evolution.spike; i++) {
            let finalAngleFixed = spikeAngle + (i * (Math.PI * 2 / evolution.spike));
            let sx = player.x + Math.cos(finalAngleFixed) * spikeRadius;
            let sy = player.y + Math.sin(finalAngleFixed) * spikeRadius;
            
            ctx.fillStyle = '#ff9900';
            ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI * 2); ctx.fill();
        }
    }

    if (evolution.wings > 0) {
        let wingPulse = Math.sin(frames * 0.1) * 5;
        ctx.fillStyle = 'rgba(0, 153, 255, 0.6)';
        
        ctx.beginPath();
        ctx.moveTo(player.x - 5, player.y);
        ctx.quadraticCurveTo(player.x - 25 - wingPulse, player.y - 15, player.x - 15, player.y + 15);
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(player.x + 5, player.y);
        ctx.quadraticCurveTo(player.x + 25 + wingPulse, player.y - 15, player.x + 15, player.y + 15);
        ctx.closePath();
        ctx.fill();
    }
    
    if (player.invincibleTime % 4 < 2) {
        ctx.fillStyle = '#0088ff';
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();
        
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(player.x - 3, player.y - 3, 4, 0, Math.PI * 2); ctx.fill();
    }
    
    if (controlMode === 'mouse') {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(mouseX - 8, mouseY); ctx.lineTo(mouseX + 8, mouseY);
        ctx.moveTo(mouseX, mouseY - 8); ctx.lineTo(mouseX, mouseY + 8);
        ctx.stroke();
    }
    
    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
    ctx.font = '14px "Courier New", monospace';
    ctx.fillText(`SYSTEM RUNTIME • LEVEL: ${player.level} (Tail:${evolution.tail} | Eye:${evolution.eye} | Spike:${evolution.spike} | Wings:${evolution.wings})`, 20, 25);
    
    ctx.fillStyle = '#331111';
    ctx.fillRect(20, 35, 180, 10);
    ctx.fillStyle = '#ff3333';
    ctx.fillRect(20, 35, (player.hp / player.maxHp) * 180, 10);
    
    ctx.fillStyle = '#112211';
    ctx.fillRect(0, 0, W, 6);
    ctx.fillStyle = '#00ff66';
    ctx.fillRect(0, 0, (player.xp / player.xpNeeded) * W, 6);
}

function updateGame() {
    if (gameStarted && !gameOver && !isPaused) {
        realSurvivalTime += 1 / 60; // บันทึกวินาทีจริง
        updatePlayerPosition();
        fireWeapons();
        updateProjectiles();
        updateEnemies();
        updateExpOrbs();
        spawnManager();
    }
    draw();
    frames++;
    requestAnimationFrame(updateGame);
}

canvas.addEventListener('click', () => {
    if (gameOver) {
        gameStarted = false;
        document.getElementById('start-screen').style.display = 'flex';
    }
});

resizeCanvas();
updateGame();
</script>
