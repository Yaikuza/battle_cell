<style>

.mode-selection-wrapper {

/* ปรับปุ่มเลือกโหมดให้เหมาะกับนิ้วสัมผัสบนมือถือ */

.input-name-field {

/* 🧬 ตารางจัดอันดับความสูงในการจัดแสดง (Leaderboard) */
.leaderboard-container {

/* 🛰️ ป้ายแสดงสถานะไฟเชื่อมต่อฐานข้อมูลคลาวด์ Supabase */

<div class="game-container">
    <!-- หน้าเลือกโหมดควบคุม ซ้าย-ขวา บิ๊กเบิ้ม -->

    </div>

    <!-- 🏆 หน้าต่างเซฟคะแนนสูงสุดตอนตาย พร้อมดึงตารางจัดอันดับย้ายมาขึ้นแสดงที่นี่ -->

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W = window.innerWidth;
let H = window.innerHeight;

let gameStarted = false;
let gameOver = false;
let isPaused = false;
let frames = 0; // frames จะเพิ่มขึ้นเสมือนรันที่คงที่ 60 FPS ด้วย Delta Time
let realSurvivalTime = 0; // วินาทีจริงที่รอดชีวิต

let controlMode = 'wasd';
let mouseX = W / 2;
let mouseY = H / 2;
let unpauseCooldown = 0; // Cooldown แช่แข็งพิกัดเมาส์หลังเลือกการ์ดเสร็จ

// ตัวแปรควบคุมจอยสติ๊กจำลอง (Virtual D-Pad) หลังบ้าน
let joystickActive = false;
let joystickStartCoords = { x: 0, y: 0 };
let joystickVector = { x: 0, y: 0 };

// ตัวแปรระบบ Boss 5 นาที (300 วินาที)
let currentBoss = null;
let lastBossSpawnTime = 0;
let bossCount = 0;

// ตัวแปรจับเวลาสำหรับรันระบบ Delta Time (Real Time Based)
let lastTime = performance.now();

// 🪐 ระบบคลังเสียงเอฟเฟกต์สังเคราะห์ (Web Audio API Engine) พร้อมคอมเพรสเซอร์กันเสียงแตกค๊า!
let audioCtx = null;
let masterCompressor = null; // คุม Dynamic Limit กันหูเคลือบทองคำแตกสลาย

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // เสกตัวคอมเพรสเซอร์คุมความดังเฉลี่ยกันไม่ให้เสียงคลิปปิ้ง
        masterCompressor = audioCtx.createDynamicsCompressor();
        masterCompressor.threshold.setValueAtTime(-24, audioCtx.currentTime); // ลิมิตยอดคลื่น
        masterCompressor.knee.setValueAtTime(30, audioCtx.currentTime);
        masterCompressor.ratio.setValueAtTime(12, audioCtx.currentTime);
        masterCompressor.attack.setValueAtTime(0.003, audioCtx.currentTime);
        masterCompressor.release.setValueAtTime(0.25, audioCtx.currentTime);
        
        masterCompressor.connect(audioCtx.destination);
    }
}

// 🔫 เสียงเลเซอร์ยิงกระสุนผู้เล่น
function playShootSound() {
    if (!audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    
    osc.connect(gain);
    gain.connect(masterCompressor || audioCtx.destination);
    
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.12);
    
    gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    
    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);
}

// 🧪 เสียงศัตรูพ่นกระสุนกรด / บอสยิงกระสุนกระจาย
function playSpitSound() {
    if (!audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    
    osc.connect(gain);
    gain.connect(masterCompressor || audioCtx.destination);
    
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(250, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.22);
    
    gain.gain.setValueAtTime(0.025, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);
    
    osc.start();
    osc.stop(audioCtx.currentTime + 0.22);
}

// 💥 เสียงผู้เล่นบาดเจ็บโดนชน/โดนกระสุน
function playHurtSound() {
    if (!audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    
    osc.connect(gain);
    gain.connect(masterCompressor || audioCtx.destination);
    
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.18);
    
    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    
    osc.start();
    osc.stop(audioCtx.currentTime + 0.18);
}

// 💎 เสียงดูดเก็บมณี EXP
function playXpSound() {
    if (!audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    
    osc.connect(gain);
    gain.connect(masterCompressor || audioCtx.destination);
    
    osc.type = 'sine';
    let now = audioCtx.currentTime;
    osc.frequency.setValueAtTime(523.25, now); // โน้ต C5
    osc.frequency.setValueAtTime(659.25, now + 0.05); // โน้ต E5
    osc.frequency.setValueAtTime(783.99, now + 0.1); // โน้ต G5
    
    gain.gain.setValueAtTime(0.02, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    
    osc.start();
    osc.stop(now + 0.18);
}

// 🪽 เสียงคลื่นช็อกเวฟระเบิดรอบตัวจากปีกพลังงานนิวเคลียส
function playShockwaveSound() {
    if (!audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    
    osc.connect(gain);
    gain.connect(masterCompressor || audioCtx.destination);
    
    osc.type = 'triangle';
    let now = audioCtx.currentTime;
    osc.frequency.setValueAtTime(60, now);
    osc.frequency.exponentialRampToValueAtTime(350, now + 0.28);
    
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.32);
    
    osc.start();
    osc.stop(now + 0.32);
}

// 🎉 เสียงแตรฉลองเลเวลอัปตอนเปิดการ์ดวิวัฒนาการ / หรือตอนโค่นบอสได้สำเร็จ
function playLevelUpSound() {
    if (!audioCtx) return;
    let now = audioCtx.currentTime;
    let notes = [261.63, 329.63, 392.00, 523.25]; // คอร์ด C Major (C4, E4, G4, C5)
    
    notes.forEach((freq, idx) => {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        
        osc.connect(gain);
        gain.connect(masterCompressor || audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now + (idx * 0.08));
        
        gain.gain.setValueAtTime(0.025, now + (idx * 0.08));
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.38);
        
        osc.start(now + (idx * 0.08));
        osc.stop(now + 0.42);
    });
}

// 🖱️ เสียงคลิกปุ่ม / เลือกการ์ด
function playClickSound() {
    if (!audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    
    osc.connect(gain);
    gain.connect(masterCompressor || audioCtx.destination);
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
    osc.frequency.setValueAtTime(2000, audioCtx.currentTime + 0.02);
    
    gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
    
    osc.start();
    osc.stop(audioCtx.currentTime + 0.05);
}

// 🛰️ ระบบเชื่อมต่อฐานข้อมูลคลาวด์ออนไลน์ Supabase 🛰️
let supabaseClient = null;

// ==========================================
// 🚨 จุดแปะคีย์คลาวด์ SUPABASE ยักษ์ ๆ ตรงนี้ค๊าาาคุณประธาน! 🚨
// นำค่า Project URL และ anon key จากหน้าเว็บ Supabase มาใส่ตรงนี้เพื่อเปิดสตรีมคะแนนข้ามกาแล็กซีค๊า!
// ==========================================
const SUPABASE_URL = "https://lyxqczagqlvtlxmdzuub.supabase.co"; 
const SUPABASE_ANON_KEY = "sb_publishable_TiXb67odxsidAFplFqvpQA_U4y8tDME";
// ==========================================

function initSupabase() {
    const statusDisplay = document.getElementById('db-status-display');
    
    // 🛡️ ป้องกันบั๊ก URL เปล่าเอ๋อยิง Error PGRST125
    if (SUPABASE_URL && SUPABASE_ANON_KEY && SUPABASE_URL.trim() !== "" && SUPABASE_ANON_KEY.trim() !== "" && typeof window.supabase !== 'undefined') {
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            if (statusDisplay) {
                statusDisplay.innerText = "🟢 ONLINE (SUPABASE CLOUD)";
                statusDisplay.className = "db-status-badge status-online";
            }
            console.log("Supabase connected successfully!");
            return true;
        } catch (e) {
            console.error("Supabase initialization error:", e);
            supabaseClient = null;
        }
    }
    
    // Fallback สวิทช์เป็นโหมดเครื่องออฟไลน์แบบสมบูรณ์
    supabaseClient = null;
    if (statusDisplay) {
        statusDisplay.innerText = "🔌 LOCAL MODE (เชื่อมต่อ Supabase ในโค้ดเพื่อเริ่มเซฟออนไลน์)";
        statusDisplay.className = "db-status-badge status-local";
    }
    return false;
}

let localLeaderboard = [
    { name: "VOID_DRIFTER", level: 12, time: 145, score: 13450 },

// โหลดคะแนนดั้งเดิมจาก LocalStorage ตุนไว้กันเหนียว
async function loadLeaderboard() {
    const statusDisplay = document.getElementById('db-status-display');
    
    // รีเซ็ตเช็กสถานะการตั้งค่าคีย์ Supabase
    const isSupabaseReady = initSupabase();

    if (isSupabaseReady && supabaseClient) {
        try {
            // ดึงข้อมูลท็อป 5 คนปังที่สุดจากคลาวด์ตรง ๆ
            let { data, error } = await supabaseClient
                .from('leaderboard')
                .select('*')
                .order('score', { ascending: false })
                .limit(5);

            if (error) throw error;

            if (data && data.length > 0) {
                localLeaderboard = data;
            }
        } catch (e) {
            console.error("Failed to load online leaderboard, falling back to local memory:", e);
            if (statusDisplay) {
                statusDisplay.innerText = "⚠️ ERROR CONNECTING SUPABASE (FALLBACK LOCAL)";
                statusDisplay.className = "db-status-badge status-local";
            }
            loadLocalStorageFallback();
        }
    } else {
        loadLocalStorageFallback();
    }
    renderLeaderboard();
}

function loadLocalStorageFallback() {
    try {
        const stored = localStorage.getItem('space_cell_leaderboard');
        if (stored) {
            localLeaderboard = JSON.parse(stored);
        }
    } catch(e) {
        console.log("LocalStorage blocked. Falling back to session memory.");
    }
}

async function saveLeaderboard(newRecord) {
    if (supabaseClient) {
        try {
            // ยัดเรคคอร์ดข้อมูลเข้าแถวตารางเซฟบันทึกบน Supabase Cloud แบบถาวรค๊าาา!
            let { error } = await supabaseClient
                .from('leaderboard')
                .insert([newRecord]);

            if (error) throw error;
            console.log("Successfully saved score online!");
        } catch (e) {
            console.error("Failed to save score online, fallback to local storage:", e);
            saveLocalStorageFallback(newRecord);
        }
    } else {
        saveLocalStorageFallback(newRecord);
    }
    await loadLeaderboard();
}

function saveLocalStorageFallback(newRecord) {
    localLeaderboard.push(newRecord);
    localLeaderboard.sort((a, b) => b.score - a.score);
    localLeaderboard = localLeaderboard.slice(0, 5);
    try {
        localStorage.setItem('space_cell_leaderboard', JSON.stringify(localLeaderboard));
    } catch(e) {}
}

function renderLeaderboard() {
    const tbody = document.getElementById('leaderboard-body');
    if (!tbody) return;
    tbody.innerHTML = '';
    
    // จัดเรียงคะแนนแบบตึง ๆ ลงกล่องบอร์ด
    localLeaderboard.sort((a, b) => b.score - a.score);
    localLeaderboard.forEach((record, index) => {
        const rank = index + 1;
        const row = document.createElement('tr');
        row.innerHTML = `
            <td class="rank-highlight">#${rank}</td>
            <td style="color: #00ffcc; font-weight: bold;">${record.name}</td>
            <td>${record.level}</td>
            <td>${record.time}s</td>
            <td style="color: #ff9900; font-weight: bold;">${record.score}</td>
        `;
        tbody.appendChild(row);
    });
}

function resizeCanvas() {
    
    const dpr = window.devicePixelRatio || 1;

    W = window.innerWidth;
    H = window.innerHeight;
    
        
    // Set canvas resolution to account for device pixel ratio
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    
    // Scale context to match device pixel ratio
    ctx.scale(dpr, dpr);
    
    // Keep CSS display size as intended
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';

    initStars();
    
    if (player && player.x) {
        player.x = Math.max(player.radius + 10, Math.min(W - player.radius - 10, player.x));
        player.y = Math.max(player.radius + 30, Math.min(H - player.radius - 10, player.y));
    }
}

// 📱 ระบบจับทัชมือถือโหมดสไลด์หน้าจอ (Touch / Mouse Movement)
function handleTouchMove(e) {
    if (!gameStarted || isPaused || gameOver || unpauseCooldown > 0) return;
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    let clientX, clientY;
    
    // ดึงพิกัดนิ้วแรกที่กดสัมผัสหน้าจอ
    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
        
        // ถ้าเป็นโหมดคีย์บอร์ดแล้วแอบมาสไลด์โดนฝั่งขวา ให้วิ่งตามนิ้ว
        if (controlMode === 'wasd') {
            if (clientX < W / 2) return;
        }
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    
    mouseX = clientX - rect.left;
    mouseY = clientY - rect.top;
}

// 📱 ระบบจำลองจอยสติ๊กคุมทิศทาง D-Pad บนมือถือ (สำหรับโหมดคีย์บอร์ด)
const joystick = document.getElementById('virtual-joystick');
const knob = document.getElementById('joystick-knob');

joystick.addEventListener('touchstart', e => {
    e.preventDefault();
    joystickActive = true;
    initAudio();
    
    const touch = e.touches[0];
    const rect = joystick.getBoundingClientRect();
    joystickStartCoords = {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2
    };
});

joystick.addEventListener('touchmove', e => {
    if (!joystickActive) return;
    e.preventDefault();
    
    const touch = e.touches[0];
    let dx = touch.clientX - joystickStartCoords.x;
    let dy = touch.clientY - joystickStartCoords.y;
    let distance = Math.hypot(dx, dy);
    let maxDistance = 40; // รัศมีสูงสุดที่จอยเคลื่อนไหวได้
    
    if (distance > maxDistance) {
        dx = (dx / distance) * maxDistance;
        dy = (dy / distance) * maxDistance;
        distance = maxDistance;
    }
    
    // อัปเดตตำแหน่งก้อนจอยสติ๊กตรงกลาง
    knob.style.transform = `translate(${dx}px, ${dy}px)`;
    joystickVector = {
        x: dx / maxDistance,
        y: dy / maxDistance
    };
});

joystick.addEventListener('touchend', e => {
    e.preventDefault();
    joystickActive = false;
    knob.style.transform = `translate(0px, 0px)`;
    joystickVector = { x: 0, y: 0 };
});

canvas.addEventListener('mousemove', handleTouchMove);
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchstart', handleTouchMove, { passive: false });

// ตัวแปรระบบเกม
let player = {};
let evolution = { tail: 0, eye: 0, spike: 0, wings: 0 };

const mutationPool = [

];

function startGame(mode) {
    initAudio();
    playClickSound();
    
    controlMode = mode;
    gameStarted = true;
    document.getElementById('start-screen').style.display = 'none';
    
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (controlMode === 'wasd' && isTouchDevice) {
        joystick.style.display = 'block';
    } else {
        joystick.style.display = 'none';
    }
    
    if (controlMode === 'mouse') {
        canvas.style.cursor = 'none';
    } else {
        canvas.style.cursor = 'default';
    }
    
    resetGame();
}

function resetGame() {
    gameOver = false;
    isPaused = false;
    frames = 0;
    realSurvivalTime = 0;
    spawnTimer = 0;
    enemies = [];
    projectiles = [];
    enemyProjectiles = [];
    expOrbs = [];
    slimes = [];
    shockwaves = [];

    unpauseCooldown = 0;
    
    currentBoss = null;

    lastTime = performance.now();
    
    player = {

function updateStars(dt) {
    stars.forEach(star => {
        star.y += star.speed * dt * 60;
        if (star.y > H) {
            star.y = 0;
            star.x = Math.random() * W;
        }
        star.brightness += (Math.random() * 0.1 - 0.05);
        star.brightness = Math.max(0.2, Math.min(1, star.brightness));
    });
}

function updatePlayerPosition(dt) {
    if (!gameStarted || gameOver || isPaused) return;
    
    let topSafetyBound = 35; 
    let sideSafetyBound = player.radius + 5;

    if (unpauseCooldown > 0) {
        unpauseCooldown -= dt * 60;
        mouseX = player.x;
        mouseY = player.y;
    }

    if (controlMode === 'wasd') {
        let currentSpeed = 3.5 + (evolution.tail * 0.6);
        let moveDistance = currentSpeed * dt * 60;
        
        if (joystickActive) {
            player.x += joystickVector.x * moveDistance;
            player.y += joystickVector.y * moveDistance;
        } else {
            if (keys.w) player.y -= moveDistance;
            if (keys.s) player.y += moveDistance;
            if (keys.a) player.x -= moveDistance;
            if (keys.d) player.x += moveDistance;
        }
    } else {
        let currentEasingSpeed = 0.08 + (evolution.tail * 0.02);
        let dx = mouseX - player.x;
        let dy = mouseY - player.y;
        let dist = Math.hypot(dx, dy);
        
        let maxSpeed = 4.5 + (evolution.tail * 0.7);
        let limitSpeedDt = maxSpeed * dt * 60;
        
        if (dist > 0) {
            let moveX = dx * currentEasingSpeed * dt * 60;
            let moveY = dy * currentEasingSpeed * dt * 60;
            let moveDist = Math.hypot(moveX, moveY);
            
            if (moveDist > limitSpeedDt) {
                player.x += (dx / dist) * limitSpeedDt;
                player.y += (dy / dist) * limitSpeedDt;
            } else {
                player.x += moveX;
                player.y += moveY;
            }
        }
    }
    
    player.x = Math.max(sideSafetyBound, Math.min(W - sideSafetyBound, player.x));
    player.y = Math.max(topSafetyBound, Math.min(H - player.radius - 10, player.y));
    
    if (player.invincibleTime > 0) player.invincibleTime -= dt * 60;
    
    if (evolution.tail > 0 && Math.floor(frames) % 28 === 0) {
        slimes.push({ x: player.x, y: player.y, radius: 10 + (evolution.tail * 2), duration: 180 });
    }

    if (evolution.wings > 0) {
        if (player.wingsCooldown > 0) {
            player.wingsCooldown -= dt * 60;
        } else {
            shockwaves.push({
                x: player.x,
                y: player.y,
                currentRadius: player.radius,
                maxRadius: 60 + (evolution.wings * 20),
                speed: 4,
                damage: 0.5 + (evolution.wings * 0.5),
                pushForce: 8 + (evolution.wings * 2)
            });
            playShockwaveSound();
            player.wingsCooldown = Math.max(60, 180 - (evolution.wings * 20));
        }
    }
}

function fireWeapons(dt) {
    if (!gameStarted || gameOver || isPaused) return;
    
    if (player.shootCooldown > 0) {
        player.shootCooldown -= dt * 60;
    } else {
        let baseCount = 4;
        for (let i = 0; i < baseCount; i++) {
            let angle = (i * Math.PI * 2) / baseCount + (frames * 0.015);
            projectiles.push({
                x: player.x, y: player.y,
                vx: Math.cos(angle) * 5.5, vy: Math.sin(angle) * 5.5,
                radius: 4, damage: 1, color: '#00ffcc'
            });
        }
        playShootSound();
        
        let targetList = currentBoss ? [currentBoss, ...enemies] : enemies;
        if (evolution.eye > 0 && targetList.length > 0) {
            let closestEnemy = null;
            let minDist = Infinity;
            targetList.forEach(e => {
                let d = Math.hypot(e.x - player.x, e.y - player.y);
                if (d < minDist) { minDist = d; closestEnemy = e; }
            });
            
            if (closestEnemy) {
                let angle = Math.atan2(closestEnemy.y - player.y, closestEnemy.x - player.x);
                for(let i = 0; i < evolution.eye; i++) {
                    let spreadAngle = angle + (i * 0.15) - ((evolution.eye-1) * 0.075);
                    projectiles.push({
                        x: player.x, y: player.y,
                        vx: Math.cos(spreadAngle) * 8, vy: Math.sin(spreadAngle) * 8,
                        radius: 6, damage: 2, color: '#ff0066'
                    });
                }
            }
        }
        player.shootCooldown = 38;
    }
}

function updateProjectiles(dt) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
        let p = projectiles[i];
        p.x += p.vx * dt * 60; 
        p.y += p.vy * dt * 60;
        if (p.x < -10 || p.x > W + 10 || p.y < -10 || p.y > H + 10) projectiles.splice(i, 1);
    }

    for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
        let ep = enemyProjectiles[i];
        ep.x += ep.vx * dt * 60; 
        ep.y += ep.vy * dt * 60;
        
        let distToPlayer = Math.hypot(player.x - ep.x, player.y - ep.y);
        if (distToPlayer < player.radius + ep.radius) {
            if (player.invincibleTime <= 0 && !gameOver && !isPaused) {
                player.hp--;
                player.invincibleTime = 30;
                playHurtSound();
                if (player.hp <= 0) handleGameOver();
            }
            enemyProjectiles.splice(i, 1);
            continue;
        }

        if (ep.x < -10 || ep.x > W + 10 || ep.y < -10 || ep.y > H + 10) {
            enemyProjectiles.splice(i, 1);
        }
    }

    for (let i = slimes.length - 1; i >= 0; i--) {
        slimes[i].duration -= dt * 60;
        if (slimes[i].duration <= 0) slimes.splice(i, 1);
    }

    for (let i = shockwaves.length - 1; i >= 0; i--) {
        let sw = shockwaves[i];
        sw.currentRadius += sw.speed * dt * 60;
        if (sw.currentRadius >= sw.maxRadius) {
            shockwaves.splice(i, 1);
        }
    }
}

function spawnManager(dt) {
    if (!gameStarted || isPaused || gameOver) return;
    
    // 👹 ระบบจับเวลาเกิดบอสทุก ๆ 5 นาที (300 วินาที)
    if (realSurvivalTime - lastBossSpawnTime >= 300) {
        bossCount++;
        lastBossSpawnTime = realSurvivalTime;
        
        currentBoss = {
            x: W / 2,
            y: H / 3,
            radius: 35,
            speed: 1.2,
            hp: 50 * bossCount,      
            maxHp: 50 * bossCount,
            shootCooldown: 60,
            color: '#ffd700',        
            name: "VOID EMPEROR"
        };
        playShockwaveSound(); 
    }
    
    let maxEnemies = Math.min(45, Math.floor((W * H) / 13000));
    spawnTimer += dt;
    
    if (spawnTimer >= 0.66 && enemies.length < maxEnemies) {
        spawnTimer = 0;
        let side = Math.floor(Math.random() * 4);
        let x, y;
        if (side === 0) { x = Math.random() * W; y = -30; }
        else if (side === 1) { x = W + 30; y = Math.random() * H; }
        else if (side === 2) { x = Math.random() * W; y = H + 30; }
        else { x = -30; y = Math.random() * H; }
        
        let canSpawnSpitter = realSurvivalTime > 120;
        let type = 'runner';
        if (canSpawnSpitter && Math.random() < 0.25) {
            type = 'spitter';
        }
        
        // 📈 สมการเพิ่มระดับความเร็วศัตรูแบบทวีคูณ (Exponential scaling)
        // สูตร: SpeedMultiplier = (1 + r) ^ (Time / 30)
        // โดยกำหนดอัตราเติบโต r = 0.08 (เพิ่มความเร็วเฉลี่ย 8% ทุกๆ 30 วินาทีจริง)
        let rate = 0.08;
        let intervals = realSurvivalTime / 30;
        let timeSpeedMultiplier = Math.pow(1 + rate, intervals);
        
        if (type === 'spitter') {
            enemies.push({ 
                x: x, y: y, radius: 14, 
                speed: 1.0 * timeSpeedMultiplier,
                hp: 3, type: 'spitter', 
                shootCooldown: Math.random() * 60 + 60,
                color: '#9933ff'
            });
        } else {
            enemies.push({ 
                x: x, y: y, radius: 11, 
                speed: 1.6 * timeSpeedMultiplier,
                hp: 2, type: 'runner',
                color: '#ff3333'
            });
        }
    }
}

function updateEnemies(dt) {
    if (currentBoss) {
        let b = currentBoss;
        let dx = player.x - b.x;
        let dy = player.y - b.y;
        let dist = Math.hypot(dx, dy);
        
        if (dist > 0) {
            b.x += (dx / dist) * b.speed * dt * 60;
            b.y += (dy / dist) * b.speed * dt * 60;
        }
        
        if (dist < player.radius + b.radius && player.invincibleTime <= 0 && !gameOver && !isPaused) {
            player.hp -= 2;
            player.invincibleTime = 40;
            playHurtSound();
            if (player.hp <= 0) handleGameOver();
        }
        
        if (b.shootCooldown > 0) {
            b.shootCooldown -= dt * 60;
        } else {
            let bulletCount = 8;
            for (let k = 0; k < bulletCount; k++) {
                let angle = (k * Math.PI * 2) / bulletCount + (frames * 0.02);
                enemyProjectiles.push({
                    x: b.x,
                    y: b.y,
                    vx: Math.cos(angle) * 3.0,
                    vy: Math.sin(angle) * 3.0,
                    radius: 7,
                    color: '#ff6600'
                });
            }
            playSpitSound();
            b.shootCooldown = 150; 
        }
        
        for (let j = projectiles.length - 1; j >= 0; j--) {
            let p = projectiles[j];
            if (Math.hypot(b.x - p.x, b.y - p.y) < b.radius + p.radius) {
                b.hp -= p.damage;
                projectiles.splice(j, 1);
                if (b.hp <= 0) {
                    expOrbs.push({ x: b.x, y: b.y, value: 25, isRainbow: true });
                    currentBoss = null;
                    playLevelUpSound();
                    break;
                }
            }
        }
        
        if (currentBoss && evolution.spike > 0) {
            let spikeRadius = player.radius + 25;
            let spikeAngle = frames * 0.05;
            for (let k = 0; k < evolution.spike; k++) {
                let finalAngleFixed = spikeAngle + (k * (Math.PI * 2 / evolution.spike));
                let sx = player.x + Math.cos(finalAngleFixed) * spikeRadius;
                let sy = player.y + Math.sin(finalAngleFixed) * spikeRadius;
                
                if (Math.hypot(b.x - sx, b.y - sy) < b.radius + 6) {
                    b.hp -= 0.15 * dt * 60;
                    if (b.hp <= 0) {
                        expOrbs.push({ x: b.x, y: b.y, value: 25, isRainbow: true });
                        currentBoss = null;
                        playLevelUpSound();
                        break;
                    }
                }
            }
        }
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let dist = Math.hypot(dx, dy);
        
        let isSlowed = false;
        slimes.forEach(s => {
            if (Math.hypot(e.x - s.x, e.y - s.y) < s.radius) isSlowed = true;
        });
        let currentEnemySpeed = isSlowed ? e.speed * 0.35 : e.speed;
        let enemyMoveDistance = currentEnemySpeed * dt * 60;
        
        if (e.type === 'spitter') {
            if (dist > 220) {
                e.x += (dx / dist) * enemyMoveDistance;
                e.y += (dy / dist) * enemyMoveDistance;
            } else if (dist < 180) {
                e.x -= (dx / dist) * enemyMoveDistance;
                e.y -= (dy / dist) * enemyMoveDistance;
            }
            
            if (dist < 400) {
                if (e.shootCooldown > 0) {
                    e.shootCooldown -= dt * 60;
                } else {
                    let angle = Math.atan2(player.y - e.y, player.x - e.x);
                    enemyProjectiles.push({
                        x: e.x, y: e.y,
                        vx: Math.cos(angle) * 2.2, vy: Math.sin(angle) * 2.2,
                        radius: 5, color: '#b300b3'
                    });
                    playSpitSound();
                    e.shootCooldown = 120;
                }
            }
        } else {
            if (dist > 0) {
                e.x += (dx / dist) * enemyMoveDistance;
                e.y += (dy / dist) * enemyMoveDistance;
            }
        }
        
        if (dist < player.radius + e.radius && player.invincibleTime <= 0 && gameStarted && !gameOver && !isPaused) {
            player.hp--;
            player.invincibleTime = 30;
            playHurtSound();
            if (player.hp <= 0) handleGameOver();
        }
        
        shockwaves.forEach(sw => {
            let distToShock = Math.hypot(e.x - sw.x, e.y - sw.y);
            if (Math.abs(distToShock - sw.currentRadius) < 15) {
                e.hp -= (sw.damage / 60) * dt * 60;
                let pushX = (e.x - player.x) / distToShock;
                let pushY = (e.y - player.y) / distToShock;
                e.x += pushX * sw.pushForce * dt * 60;
                e.y += pushY * sw.pushForce * dt * 60;
            }
        });
        
        for (let j = projectiles.length - 1; j >= 0; j--) {
            let p = projectiles[j];
            if (Math.hypot(e.x - p.x, e.y - p.y) < e.radius + p.radius) {
                e.hp -= p.damage;
                projectiles.splice(j, 1);
                if (e.hp <= 0) {
                    expOrbs.push({ x: e.x, y: e.y, value: e.type === 'spitter' ? 4 : 2 });
                    enemies.splice(i, 1);
                    break;
                }
            }
        }
        
        if (evolution.spike > 0) {
            let spikeRadius = player.radius + 25;
            let spikeAngle = frames * 0.05;
            for (let k = 0; k < evolution.spike; k++) {
                let finalAngleFixed = spikeAngle + (k * (Math.PI * 2 / evolution.spike));
                let sx = player.x + Math.cos(finalAngleFixed) * spikeRadius;
                let sy = player.y + Math.sin(finalAngleFixed) * spikeRadius;
                
                if (Math.hypot(e.x - sx, e.y - sy) < e.radius + 6) {
                    e.hp -= 0.15 * dt * 60;
                    if (e.hp <= 0) {
                        expOrbs.push({ x: e.x, y: e.y, value: e.type === 'spitter' ? 4 : 2 });
                        enemies.splice(i, 1);
                        break;
                    }
                }
            }
        }
    }
}

function updateExpOrbs(dt) {
    for (let i = expOrbs.length - 1; i >= 0; i--) {
        let o = expOrbs[i];
        let dist = Math.hypot(player.x - o.x, player.y - o.y);
        
        let magnetRange = 65 + (evolution.eye * 20);
        if (dist < magnetRange) {
            o.x += (player.x - o.x) * 0.16 * dt * 60;
            o.y += (player.y - o.y) * 0.16 * dt * 60;
        }
        
        if (dist < player.radius + 6) {
            player.xp += o.value;
            playXpSound();
            expOrbs.splice(i, 1);
            if (player.xp >= player.xpNeeded) triggerEvolutionMenu();
        }
    }
}

function triggerEvolutionMenu() {
    isPaused = true;
    player.xp -= player.xpNeeded;
    player.level++;
    player.xpNeeded = Math.floor(player.xpNeeded * 1.5);
    
    playLevelUpSound();
    
    const overlay = document.getElementById('evolution-overlay');
    const cardList = document.getElementById('card-list');
    cardList.innerHTML = '';
    
    let shuffled = [...mutationPool].sort(() => 0.5 - Math.random()).slice(0, 3);
    shuffled.forEach(mutation => {
        let currentLvl = evolution[mutation.id];
        let card = document.createElement('div');
        card.className = 'evo-card';
        card.innerHTML = `
            <h3>${mutation.name}</h3>
            <p>${mutation.desc}</p>
            <div style="margin-top:5px; font-size:11px; color:#00ffcc;">LEVEL: ${currentLvl} → ${currentLvl + 1}</div>
        `;
        
        card.onclick = () => {
            playClickSound();
            evolution[mutation.id]++;
            isPaused = false;
            overlay.style.display = 'none';
            
            mouseX = player.x;
            mouseY = player.y;
            unpauseCooldown = 30;
            lastTime = performance.now();
        };
        cardList.appendChild(card);
    });
    overlay.style.display = 'flex';
}

let lastCalculatedScore = 0;
function handleGameOver() {
    gameOver = true;
    isPaused = true;

    lastCalculatedScore = (player.level * 1000) + (Math.floor(realSurvivalTime) * 10) + (bossCount * 2500);
    playHurtSound();
    
    document.getElementById('final-score-val').innerText = lastCalculatedScore;
    document.getElementById('final-stats-desc').innerText = `LEVEL: ${player.level} • TIME: ${Math.floor(realSurvivalTime)}s • BOSS DEFEATED: ${currentBoss ? bossCount-1 : bossCount}`;
    
    loadLeaderboard();
    document.getElementById('score-save-overlay').style.display = 'flex';
}

async function submitScore() {
    playClickSound();
    let rawName = document.getElementById('player-name-input').value.trim();
    let finalName = rawName !== "" ? rawName.toUpperCase() : "MUTANT_CELL";
    
    const newRecord = {
        name: finalName,
        level: player.level,
        time: Math.floor(realSurvivalTime),
        score: lastCalculatedScore
    };

    // ส่งคะแนนออนไลน์เข้าคลาวด์ หรือเซฟออฟไลน์ในเครื่องออโต้ค๊าาา
    await saveLeaderboard(newRecord);
    
    document.getElementById('score-save-overlay').style.display = 'none';
    document.getElementById('start-screen').style.display = 'flex';
    gameStarted = false;
}

function draw() {
    ctx.fillStyle = '#0d101a';
    ctx.fillRect(0, 0, W, H);
    
    stars.forEach(star => {
        ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
    });
    
    if (!gameStarted) return; 
    
    slimes.forEach(s => {
        ctx.fillStyle = 'rgba(0, 255, 100, 0.1)';
        ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2); ctx.fill();
    });
    
    shockwaves.forEach(sw => {
        ctx.strokeStyle = `rgba(0, 102, 255, ${1 - (sw.currentRadius / sw.maxRadius)})`;
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.currentRadius, 0, Math.PI * 2); ctx.stroke();
    });
    
    expOrbs.forEach(o => {
        if (o.isRainbow) {
            let hue = (frames * 5) % 360;
            ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
            ctx.beginPath(); ctx.arc(o.x, o.y, 9, 0, Math.PI * 2); ctx.fill();
        } else {
            ctx.fillStyle = '#00ff66';
            ctx.beginPath(); ctx.arc(o.x, o.y, 4, 0, Math.PI * 2); ctx.fill();
        }
    });
    
    projectiles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
    });

    enemyProjectiles.forEach(ep => {
        ctx.fillStyle = ep.color;
        ctx.beginPath(); ctx.arc(ep.x, ep.y, ep.radius, 0, Math.PI * 2); ctx.fill();
    });
    
    enemies.forEach(e => {
        ctx.fillStyle = e.color;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2); ctx.fill();
        if (e.type === 'spitter') {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(e.x, e.y, e.radius + 3, 0, Math.PI * 2); ctx.stroke();
        }
    });
    
    // 👹 วาดตัว Boss จักรพรรดิสีทองออร่ากระจาย
    if (currentBoss) {
        let b = currentBoss;
        let pulse = Math.sin(frames * 0.1) * 4;
        
        ctx.fillStyle = 'rgba(255, 215, 0, 0.15)';
        ctx.beginPath(); ctx.arc(b.x, b.y, b.radius + pulse, 0, Math.PI * 2); ctx.fill();
        
        ctx.fillStyle = b.color;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2); ctx.fill();
        
        ctx.fillStyle = '#ff0033';
        ctx.beginPath(); ctx.arc(b.x, b.y, 10, 0, Math.PI * 2); ctx.fill();
        
        let barW = 100;
        let barH = 6;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(b.x - barW/2, b.y - b.radius - 15, barW, barH);
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(b.x - barW/2, b.y - b.radius - 15, (b.hp / b.maxHp) * barW, barH);
        
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 9px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(b.name, b.x, b.y - b.radius - 20);
    }
    
    if (evolution.spike > 0) {
        let spikeRadius = player.radius + 25;
        let spikeAngle = frames * 0.05;
        for (let i = 0; i < evolution.spike; i++) {
            let finalAngleFixed = spikeAngle + (i * (Math.PI * 2 / evolution.spike));
            let sx = player.x + Math.cos(finalAngleFixed) * spikeRadius;
            let sy = player.y + Math.sin(finalAngleFixed) * spikeRadius;
            ctx.fillStyle = '#ff9900';
            ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI * 2); ctx.fill();
        }
    }

    if (evolution.wings > 0) {
        let wingPulse = Math.sin(frames * 0.1) * 5;
        ctx.fillStyle = 'rgba(0, 153, 255, 0.6)';
        
        ctx.beginPath();
        ctx.moveTo(player.x - 5, player.y);
        ctx.quadraticCurveTo(player.x - 25 - wingPulse, player.y - 15, player.x - 15, player.y + 15);
        ctx.closePath(); ctx.fill();

        ctx.beginPath();
        ctx.moveTo(player.x + 5, player.y);
        ctx.quadraticCurveTo(player.x + 25 + wingPulse, player.y - 15, player.x + 15, player.y + 15);
        ctx.closePath(); ctx.fill();
    }
    
    if (player.invincibleTime % 4 < 2) {
        ctx.fillStyle = '#0088ff';
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(player.x - 3, player.y - 3, 4, 0, Math.PI * 2); ctx.fill();
    }

    if (unpauseCooldown > 0) {
        ctx.strokeStyle = `rgba(255, 255, 255, ${unpauseCooldown / 30})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius + 15, 0, Math.PI * 2); ctx.stroke();
    }
    
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (controlMode === 'mouse' && !isTouchDevice) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        let targetX = unpauseCooldown > 0 ? player.x : mouseX;
        let targetY = unpauseCooldown > 0 ? player.y : mouseY;
        ctx.moveTo(targetX - 8, targetY); ctx.lineTo(targetX + 8, targetY);
        ctx.moveTo(targetX, targetY - 8); ctx.lineTo(targetX, targetY + 8);
        ctx.stroke();
    }
    
    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
    ctx.font = '12px "Courier New", monospace';
    ctx.textAlign = 'left';
    
    let step = Math.floor(realSurvivalTime / 30);
    let currentMult = Math.pow(1 + 0.08, realSurvivalTime / 30).toFixed(2);
    ctx.fillText(`TIME: ${Math.floor(realSurvivalTime)}s (Speed x${currentMult})`, 20, 25);
    ctx.fillText(`LVL: ${player.level}`, W - 80, 25);
    
    ctx.fillStyle = '#331111';
    ctx.fillRect(20, 35, 180, 10);
    ctx.fillStyle = '#ff3333';
    ctx.fillRect(20, 35, (player.hp / player.maxHp) * 180, 10);
    
    ctx.fillStyle = '#112211';
    ctx.fillRect(0, 0, W, 6);
    ctx.fillStyle = '#00ff66';
    ctx.fillRect(0, 0, (player.xp / player.xpNeeded) * W, 6);
    
    let timeUntilNextBoss = 300 - (realSurvivalTime % 300);
    if (timeUntilNextBoss <= 10 && !currentBoss) {
        ctx.fillStyle = '#ff3333';
        ctx.font = 'bold 14px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`⚠️ WARNING: BOSS INCOMING IN ${Math.ceil(timeUntilNextBoss)}s ⚠️`, W/2, H/4);
    }
    
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#ff3333';
        ctx.font = 'bold 24px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W/2, H/2 - 15);
        ctx.fillStyle = '#fff';
        ctx.font = '12px "Courier New", monospace';
        ctx.fillText('TAP TO RETRY SYSTEM', W/2, H/2 + 20);
    }
}

function updateGame() {
    let now = performance.now();
    let dt = (now - lastTime) / 1000;
    lastTime = now;
    
    if (dt > 0.1) dt = 0.1; 

    if (gameStarted && !gameOver && !isPaused) {
        realSurvivalTime += dt;
        frames += dt * 60;
        
        updatePlayerPosition(dt);
        fireWeapons(dt);
        updateProjectiles(dt);
        updateEnemies(dt);
        updateExpOrbs(dt);
        spawnManager(dt);
    }
    
    updateStars(dt);
    draw();
    requestAnimationFrame(updateGame);
}

canvas.addEventListener('click', () => {
    if (gameOver) {
        gameStarted = false;
        document.getElementById('start-screen').style.display = 'flex';
    }
});

resizeCanvas();
updateGame();
</script>
